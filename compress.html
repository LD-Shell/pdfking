<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compress PDF | PDFKing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen flex flex-col">

    <nav class="p-6 flex justify-between items-center max-w-6xl mx-auto w-full">
        <a href="index.html" class="text-2xl font-black tracking-tighter text-indigo-600 hover:opacity-80 transition-opacity">PDFKing</a>
        <a href="index.html" class="text-sm font-medium hover:text-indigo-600"><i class="fa-solid fa-arrow-left mr-2"></i>Back to Tools</a>
    </nav>

    <main class="max-w-2xl mx-auto px-6 py-12 flex-grow w-full text-center">
        <div class="w-16 h-16 bg-green-100 rounded-2xl flex items-center justify-center mx-auto mb-6 text-green-600">
            <i class="fa-solid fa-compress text-3xl"></i>
        </div>
        <h2 class="text-3xl font-extrabold mb-4">Compress PDF</h2>
        <p class="text-slate-500 mb-8">Reduce your PDF file size structurally for easier sharing and emailing.</p>

        <div class="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm">
            <input type="file" id="fileInput" accept="application/pdf" class="hidden">
            <label for="fileInput" class="cursor-pointer block border-2 border-dashed border-green-300 bg-green-50 rounded-xl p-8 hover:bg-green-100 transition-colors mb-6 text-center">
                <i class="fa-solid fa-file-pdf text-4xl text-green-400 mb-3"></i>
                <span id="fileLabel" class="block text-green-700 font-medium">Click to select a PDF file</span>
                <span id="fileSize" class="block text-sm text-green-600 mt-1 hidden"></span>
            </label>

            <button id="compressBtn" class="w-full bg-green-600 text-white font-bold py-3 px-6 rounded-xl hover:bg-green-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                Compress File
            </button>
            
            <div id="status" class="mt-4 text-sm font-medium hidden text-center p-4 rounded-xl"></div>
        </div>
    </main>

    <script>
        const fileInput = document.getElementById('fileInput');
        const fileLabel = document.getElementById('fileLabel');
        const fileSizeLabel = document.getElementById('fileSize');
        const compressBtn = document.getElementById('compressBtn');
        const statusDiv = document.getElementById('status');
        
        let currentFile = null;

        // Format bytes into readable string
        function formatBytes(bytes, decimals = 2) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
        }

        // Handle file selection
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length === 0) return;
            
            currentFile = e.target.files[0];
            fileLabel.innerText = currentFile.name;
            fileSizeLabel.innerText = `Original Size: ${formatBytes(currentFile.size)}`;
            fileSizeLabel.classList.remove('hidden');
            
            compressBtn.disabled = false;
            statusDiv.classList.add('hidden');
        });

        // Execute compression
        compressBtn.addEventListener('click', async () => {
            if (!currentFile) return;

            try {
                // Update UI to processing state
                compressBtn.disabled = true;
                compressBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>Compressing...';
                statusDiv.className = 'mt-4 text-sm font-medium text-slate-600 block bg-slate-50 text-center p-4 rounded-xl';
                statusDiv.innerText = 'Optimizing document structure...';

                const fileArrayBuffer = await currentFile.arrayBuffer();
                const { PDFDocument } = PDFLib;
                
                // Load the document
                const pdfDoc = await PDFDocument.load(fileArrayBuffer, { ignoreEncryption: true });
                
                // Save the document using object streams to structurally compress it
                const compressedPdfBytes = await pdfDoc.save({ useObjectStreams: true });

                const originalSize = currentFile.size;
                const newSize = compressedPdfBytes.byteLength;
                
                // Evaluate compression results
                if (newSize < originalSize) {
                    const savedBytes = originalSize - newSize;
                    const savedPercent = ((savedBytes / originalSize) * 100).toFixed(1);
                    statusDiv.className = 'mt-4 text-sm font-medium text-green-700 block bg-green-50 text-center p-4 rounded-xl';
                    statusDiv.innerHTML = `Success! Saved ${savedPercent}% (${formatBytes(savedBytes)}).<br>New Size: ${formatBytes(newSize)}`;
                } else {
                    statusDiv.className = 'mt-4 text-sm font-medium text-orange-700 block bg-orange-50 text-center p-4 rounded-xl';
                    statusDiv.innerHTML = `This PDF is already highly optimized.<br>The output file size remains similar at ${formatBytes(newSize)}.`;
                }

                // Trigger client-side download
                const blob = new Blob([compressedPdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `compressed_${currentFile.name}`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

            } catch (error) {
                console.error(error);
                statusDiv.className = 'mt-4 text-sm font-medium text-red-700 block bg-red-50 text-center p-4 rounded-xl';
                statusDiv.innerText = 'An error occurred. The file may be password-protected or corrupted.';
            } finally {
                compressBtn.disabled = false;
                compressBtn.innerText = 'Compress File';
            }
        });
    </script>
</body>
</html>
