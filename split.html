<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced PDF Split & Extract | PDFKing</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>

    <style>
        /* # Defining custom transitions for smooth interface interactions */
        .page-card { transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease; cursor: pointer; }
        .page-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .page-card.selected { border-color: #ef4444; background-color: rgba(239, 68, 68, 0.05); }
        .page-card.selected .selection-indicator { background-color: #ef4444; border-color: #ef4444; color: white; }
        
        /* # Defining toast notification animations */
        @keyframes slideIn { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
        .toast-enter { animation: slideIn 0.3s forwards; }
        .toast-exit { animation: fadeOut 0.3s forwards; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 min-h-screen flex flex-col transition-colors duration-300">

    <nav class="border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-16 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-layer-group text-red-600 dark:text-red-500 text-xl"></i>
                <span class="text-xl font-black tracking-tighter text-slate-900 dark:text-white">PDFKing</span>
            </div>
            <div class="flex items-center gap-4">
                <button id="themeToggle" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors" title="Toggle Dark Mode">
                    <i class="fa-solid fa-moon dark:hidden"></i>
                    <i class="fa-solid fa-sun hidden dark:block text-yellow-400"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl mx-auto px-6 py-8 w-full flex flex-col">
        
        <div id="uploadZone" class="flex-grow flex flex-col items-center justify-center border-2 border-dashed border-red-300 dark:border-red-700 rounded-3xl bg-red-50/50 dark:bg-red-900/10 hover:bg-red-50 dark:hover:bg-red-900/20 transition-all cursor-pointer p-12 text-center group">
            <input type="file" id="fileInput" accept="application/pdf" class="hidden">
            <div class="w-20 h-20 bg-red-100 dark:bg-red-900/50 rounded-2xl flex items-center justify-center mb-6 text-red-600 dark:text-red-400 group-hover:scale-110 transition-transform">
                <i class="fa-solid fa-scissors text-4xl"></i>
            </div>
            <h2 class="text-3xl font-bold mb-3">Upload a Document to Split</h2>
            <p class="text-slate-500 dark:text-slate-400 mb-6 max-w-md">Drag and drop your file here. You will be able to select specific pages to extract into a new document.</p>
            <button class="bg-red-600 hover:bg-red-700 text-white px-8 py-3 rounded-xl font-medium transition-colors shadow-sm">
                Select PDF File
            </button>
        </div>

        <div id="workspace" class="hidden flex-col gap-6 w-full">
            
            <div class="bg-white dark:bg-slate-950 p-6 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm flex flex-wrap items-center justify-between gap-4 sticky top-20 z-40">
                <div class="flex flex-col">
                    <h3 id="fileName" class="font-bold text-lg truncate max-w-xs md:max-w-md" title="Document Name"></h3>
                    <p id="fileMeta" class="text-sm text-slate-500 dark:text-slate-400"></p>
                </div>
                
                <div class="flex items-center gap-3 flex-wrap">
                    <div class="flex bg-slate-100 dark:bg-slate-900 rounded-lg p-1 border border-slate-200 dark:border-slate-800">
                        <button id="selectAllBtn" class="px-3 py-1.5 rounded-md hover:bg-white dark:hover:bg-slate-800 hover:shadow-sm text-sm font-medium transition-all" title="Select all pages">
                            <i class="fa-solid fa-check-double mr-1.5"></i> All
                        </button>
                        <button id="clearSelectionBtn" class="px-3 py-1.5 rounded-md hover:bg-white dark:hover:bg-slate-800 hover:shadow-sm text-sm font-medium transition-all" title="Clear selection">
                            <i class="fa-solid fa-eraser mr-1.5"></i> Clear
                        </button>
                    </div>

                    <div class="h-8 w-px bg-slate-200 dark:bg-slate-800 hidden md:block"></div>

                    <div class="flex items-center gap-2">
                        <input type="text" id="exportFilename" placeholder="extracted_pages.pdf" class="px-3 py-2 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-lg text-sm focus:ring-2 focus:ring-red-500 outline-none w-44">
                        <button id="extractBtn" class="bg-slate-900 dark:bg-red-600 text-white px-5 py-2 rounded-lg font-medium hover:bg-slate-800 dark:hover:bg-red-700 transition-colors flex items-center shadow-sm disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                            <i class="fa-solid fa-file-export mr-2"></i> Extract (<span id="selectionCount">0</span>)
                        </button>
                    </div>
                </div>
            </div>

            <div id="loadingOverlay" class="py-20 flex flex-col items-center justify-center hidden">
                <i class="fa-solid fa-circle-notch fa-spin text-4xl text-red-600 dark:text-red-500 mb-4"></i>
                <p id="loadingText" class="text-slate-600 dark:text-slate-400 font-medium">Processing document...</p>
                <div class="w-64 h-2 bg-slate-200 dark:bg-slate-800 rounded-full mt-4 overflow-hidden">
                    <div id="loadingProgress" class="h-full bg-red-600 transition-all duration-300" style="width: 0%"></div>
                </div>
            </div>

            <div id="pagesGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6 hidden">
                </div>

        </div>
    </main>

    <div id="toastContainer" class="fixed bottom-6 right-6 z-50 flex flex-col gap-3"></div>

    <script>
        // # --- 6. State management ---
        // I am maintaining a Set to track selected page indices efficiently without duplicates.
        let currentFileBuffer = null;
        let originalFileName = '';
        let totalDocumentPages = 0;
        let selectedPages = new Set();
        let isProcessing = false;

        // # Selecting DOM elements
        const themeToggle = document.getElementById('themeToggle');
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        const workspace = document.getElementById('workspace');
        const fileNameEl = document.getElementById('fileName');
        const fileMetaEl = document.getElementById('fileMeta');
        const pagesGrid = document.getElementById('pagesGrid');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const loadingText = document.getElementById('loadingText');
        const loadingProgress = document.getElementById('loadingProgress');
        const exportFilename = document.getElementById('exportFilename');
        const extractBtn = document.getElementById('extractBtn');
        const selectionCountEl = document.getElementById('selectionCount');

        // # --- 7. Application behavior ---

        // # Handling dark mode toggle
        themeToggle.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
        });

        // # Binding drag and drop events
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            uploadZone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            uploadZone.addEventListener(eventName, () => {
                uploadZone.classList.add('border-red-500', 'bg-red-100', 'dark:bg-red-900/40');
            });
        });

        ['dragleave', 'drop'].forEach(eventName => {
            uploadZone.addEventListener(eventName, () => {
                uploadZone.classList.remove('border-red-500', 'bg-red-100', 'dark:bg-red-900/40');
            });
        });

        uploadZone.addEventListener('drop', (e) => {
            const dt = e.dataTransfer;
            const files = dt.files;
            if (files.length) handleFile(files[0]);
        });

        uploadZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) handleFile(e.target.files[0]);
        });

        // # --- 8. Document processing pipeline ---

        // # Initializing file handling
        async function handleFile(file) {
            if (file.type !== 'application/pdf') {
                showToast('Please upload a valid PDF document.', 'error');
                return;
            }

            originalFileName = file.name;
            exportFilename.value = `extracted_${originalFileName}`;
            fileNameEl.innerText = originalFileName;
            fileMetaEl.innerText = `${formatBytes(file.size)} • Analyzing...`;
            
            uploadZone.classList.add('hidden');
            workspace.classList.remove('hidden');
            pagesGrid.classList.add('hidden');
            loadingOverlay.classList.remove('hidden');

            try {
                // I am loading the binary buffer into memory for visualization and subsequent extraction.
                currentFileBuffer = await file.arrayBuffer();
                await renderDocumentPreviews(currentFileBuffer);
            } catch (error) {
                console.error(error);
                showToast('A fatal error occurred parsing the document.', 'error');
                resetWorkspace();
            }
        }

        // # Generating visual representations via pdf.js
        async function renderDocumentPreviews(arrayBuffer) {
            loadingText.innerText = 'Initializing rendering engine...';
            
            const loadingTask = pdfjsLib.getDocument(arrayBuffer);
            const pdf = await loadingTask.promise;
            totalDocumentPages = pdf.numPages;
            
            fileMetaEl.innerText = `${formatBytes(currentFileBuffer.byteLength)} • ${totalDocumentPages} Pages`;
            
            pagesGrid.innerHTML = '';
            selectedPages.clear();
            updateSelectionState();

            // I am restricting the viewport scale to optimize memory allocation during rasterization.
            for (let i = 1; i <= totalDocumentPages; i++) {
                loadingText.innerText = `Rasterizing page ${i} of ${totalDocumentPages}...`;
                loadingProgress.style.width = `${(i / totalDocumentPages) * 100}%`;
                
                const page = await pdf.getPage(i);
                const viewport = page.getViewport({ scale: 0.6 });
                
                const card = createPageCard(i, viewport.width, viewport.height);
                pagesGrid.appendChild(card);
                
                const canvas = card.querySelector('canvas');
                const ctx = canvas.getContext('2d', { alpha: false });
                
                const renderContext = { canvasContext: ctx, viewport: viewport };
                await page.render(renderContext).promise;
                
                // Yielding execution to maintain UI responsiveness.
                await new Promise(resolve => requestAnimationFrame(resolve));
            }

            loadingOverlay.classList.add('hidden');
            pagesGrid.classList.remove('hidden');
            showToast('Document parsed successfully. Select pages to extract.', 'success');
        }

        // # --- 9. Interface rendering and control logic ---

        // # Constructing individual DOM elements for page interaction
        function createPageCard(pageNum, width, height) {
            const div = document.createElement('div');
            // Using a distinct visual style for selection feedback.
            div.className = 'page-card bg-white dark:bg-slate-950 border-2 border-slate-200 dark:border-slate-800 rounded-xl overflow-hidden flex flex-col relative';
            div.dataset.page = pageNum - 1; 

            div.innerHTML = `
                <div class="absolute top-3 left-3 z-20">
                    <span class="bg-black/60 text-white text-xs font-bold px-2 py-1 rounded backdrop-blur-sm">${pageNum}</span>
                </div>
                <div class="absolute top-3 right-3 z-20 selection-indicator w-6 h-6 rounded-full border-2 border-slate-300 dark:border-slate-600 flex items-center justify-center bg-white dark:bg-slate-800 text-transparent transition-colors shadow-sm">
                    <i class="fa-solid fa-check text-xs"></i>
                </div>
                <div class="relative bg-slate-100 dark:bg-slate-900 aspect-[1/1.4] flex items-center justify-center overflow-hidden p-2 pointer-events-none">
                    <canvas width="${width}" height="${height}" class="max-w-full max-h-full object-contain shadow-sm bg-white"></canvas>
                </div>
            `;

            // Binding click event to toggle selection state.
            div.addEventListener('click', () => togglePageSelection(pageNum - 1, div));

            return div;
        }

        function togglePageSelection(pageIndex, cardElement) {
            if (selectedPages.has(pageIndex)) {
                selectedPages.delete(pageIndex);
                cardElement.classList.remove('selected');
            } else {
                selectedPages.add(pageIndex);
                cardElement.classList.add('selected');
            }
            updateSelectionState();
        }

        function updateSelectionState() {
            const count = selectedPages.size;
            selectionCountEl.innerText = count;
            extractBtn.disabled = count === 0;
        }

        // # Binding global control events
        document.getElementById('selectAllBtn').addEventListener('click', () => {
            const cards = document.querySelectorAll('.page-card');
            cards.forEach(card => {
                const idx = parseInt(card.dataset.page);
                selectedPages.add(idx);
                card.classList.add('selected');
            });
            updateSelectionState();
        });

        document.getElementById('clearSelectionBtn').addEventListener('click', () => {
            selectedPages.clear();
            const cards = document.querySelectorAll('.page-card');
            cards.forEach(card => card.classList.remove('selected'));
            updateSelectionState();
        });

        // # --- 10. Binary generation and export ---
        
        extractBtn.addEventListener('click', async () => {
            if (isProcessing || selectedPages.size === 0 || !currentFileBuffer) return;
            
            try {
                isProcessing = true;
                const originalText = extractBtn.innerHTML;
                extractBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Extracting...';
                extractBtn.classList.add('opacity-75', 'cursor-not-allowed');

                // I am sorting the selected indices to ensure the extracted document maintains chronological order.
                const indicesToExtract = Array.from(selectedPages).sort((a, b) => a - b);

                // I am loading the master buffer and copying only the requested vectors into a new structure.
                const { PDFDocument } = PDFLib;
                const sourcePdf = await PDFDocument.load(currentFileBuffer);
                const newPdf = await PDFDocument.create();
                
                const copiedPages = await newPdf.copyPages(sourcePdf, indicesToExtract);
                copiedPages.forEach((page) => newPdf.addPage(page));

                // Serializing to binary array and triggering browser download.
                const pdfBytes = await newPdf.save();
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                
                const finalFilename = exportFilename.value.trim() || `extracted_${originalFileName}`;
                const a = document.createElement('a');
                a.href = url;
                a.download = finalFilename.endsWith('.pdf') ? finalFilename : `${finalFilename}.pdf`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                showToast(`Successfully extracted ${selectedPages.size} pages.`, 'success');
                
                // Restoring interface state
                extractBtn.innerHTML = originalText;
                extractBtn.classList.remove('opacity-75', 'cursor-not-allowed');
                isProcessing = false;

            } catch (error) {
                console.error(error);
                showToast('An error occurred during binary extraction.', 'error');
                isProcessing = false;
            }
        });

        // # --- 11. Utility functions ---

        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function resetWorkspace() {
            uploadZone.classList.remove('hidden');
            workspace.classList.add('hidden');
            currentFileBuffer = null;
            selectedPages.clear();
        }

        // I am maintaining a transient toast system for non-blocking notifications.
        function showToast(message, type = 'info') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            
            const colors = {
                success: 'bg-emerald-50 text-emerald-800 border-emerald-200 dark:bg-emerald-900/30 dark:text-emerald-400 dark:border-emerald-800',
                error: 'bg-red-50 text-red-800 border-red-200 dark:bg-red-900/30 dark:text-red-400 dark:border-red-800',
                info: 'bg-blue-50 text-blue-800 border-blue-200 dark:bg-blue-900/30 dark:text-blue-400 dark:border-blue-800'
            };

            const icons = {
                success: 'fa-circle-check',
                error: 'fa-triangle-exclamation',
                info: 'fa-circle-info'
            };

            toast.className = `flex items-center gap-3 px-4 py-3 rounded-xl border shadow-lg toast-enter ${colors[type]}`;
            toast.innerHTML = `
                <i class="fa-solid ${icons[type]} text-lg"></i>
                <span class="font-medium text-sm">${message}</span>
            `;

            container.appendChild(toast);

            setTimeout(() => {
                toast.classList.replace('toast-enter', 'toast-exit');
                toast.addEventListener('animationend', () => toast.remove());
            }, 4000);
        }
    </script>

    <footer class="mt-auto border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950 py-12">
        <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row items-center justify-between text-slate-500 dark:text-slate-400">
            
            <div class="flex items-center gap-2 mb-4 md:mb-0">
                <i class="fa-solid fa-crown text-xl text-slate-300 dark:text-slate-700"></i>
                <span class="font-bold text-slate-700 dark:text-slate-300">PDFKing</span>
            </div>
            
            <div class="text-center md:text-left mb-4 md:mb-0 text-sm font-medium">
                &copy; 2026 PDFKing. Built for Privacy.
            </div>

            <div class="flex gap-6 text-sm font-medium">
                <a href="privacy.html" class="hover:text-indigo-500 transition-colors">Privacy Policy</a>
                <a href="privacy.html" class="hover:text-indigo-500 transition-colors">Terms of Service</a>
            </div>

        </div>
    </footer>
</body>
</html>
