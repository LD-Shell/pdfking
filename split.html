<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Split & Extract PDF Pages | PDFKing</title>
    <meta name="title" content="Split & Extract PDF Pages | PDFKing">
    <meta name="description" content="Extract specific pages or split your PDF into multiple files. Processed entirely offline in your browser, securely and instantly bundled into a ZIP.">
    <meta name="keywords" content="split pdf, extract pdf pages, separate pdf pages, pdf page extractor, offline pdf tools">
    <meta name="theme-color" content="#10b981"> <link rel="canonical" href="https://pdfking.net/split.html">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://pdfking.net/split.html">
    <meta property="og:title" content="Split & Extract PDF Pages Instantly | PDFKing">
    <meta property="og:description" content="Separate PDF pages securely. 100% processed locally in your browser.">
    <meta property="og:image" content="https://pdfking.net/assets/og-image.webp">

    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://pdfking.net/split.html">
    <meta property="twitter:title" content="Split & Extract PDF Pages Instantly | PDFKing">
    <meta property="twitter:description" content="Separate PDF pages securely. 100% processed locally in your browser.">
    <meta property="twitter:image" content="https://pdfking.net/assets/og-image.png">

    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } };
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) { document.documentElement.classList.add('dark'); }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 min-h-screen flex flex-col transition-colors duration-300">

    <header class="border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950 sticky top-0 z-50">
        <nav class="max-w-7xl mx-auto px-6 h-16 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 hover:opacity-80 transition-opacity">
                <i class="fa-solid fa-crown text-indigo-600 text-xl"></i>
                <span class="text-xl font-black tracking-tighter">PDFKing</span>
            </a>
            <button id="themeToggle" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                <i class="fa-solid fa-moon dark:hidden"></i>
                <i class="fa-solid fa-sun hidden dark:block text-yellow-400"></i>
            </button>
        </nav>
    </header>

    <main class="flex-grow max-w-7xl mx-auto px-6 py-8 w-full flex flex-col items-center">
        
        <section id="uploadZone" class="w-full max-w-4xl flex flex-col items-center justify-center border-2 border-dashed border-emerald-300 rounded-3xl bg-emerald-50/50 hover:bg-emerald-50 cursor-pointer p-16 text-center group transition-colors">
            <input type="file" id="fileInput" accept="application/pdf" class="hidden">
            <div class="w-20 h-20 bg-emerald-100 rounded-2xl flex items-center justify-center mb-6 text-emerald-600 group-hover:scale-110 transition-transform">
                <i class="fa-solid fa-scissors text-4xl"></i>
            </div>
            <h1 class="text-3xl font-bold mb-3">Split PDF Pages</h1>
            <p class="text-slate-500 mb-6">Visually extract ranges or split your PDF into multiple files.</p>
            <button class="bg-emerald-500 hover:bg-emerald-600 text-white px-8 py-3 rounded-xl font-medium shadow-sm transition-colors">Select PDF File</button>
        </section>

        <div id="loadingOverlay" class="hidden flex-col items-center justify-center py-20 w-full">
            <i class="fa-solid fa-circle-notch fa-spin text-5xl text-emerald-500 mb-4"></i>
            <p id="loadingText" class="text-lg font-medium text-slate-600">Rendering pages...</p>
        </div>

        <section id="workspace" class="hidden flex-col gap-6 w-full h-full">
            
            <div class="bg-white dark:bg-slate-950 p-4 rounded-2xl border border-slate-200 shadow-sm flex flex-col lg:flex-row items-center justify-between gap-4 sticky top-20 z-40">
                
                <div class="flex flex-col md:flex-row items-center gap-3 w-full lg:w-auto">
                    <select id="splitMode" class="bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-emerald-500 font-medium">
                        <option value="custom">Extract custom ranges (Click to select)</option>
                        <option value="fixed">Split into chunks of X pages</option>
                        <option value="all">Extract all pages individually</option>
                    </select>

                    <div id="splitInputContainer" class="relative w-full md:w-64">
                        <i class="fa-solid fa-keyboard absolute left-3 top-2.5 text-slate-400 text-sm"></i>
                        <input type="text" id="splitInput" placeholder="e.g. 1-3, 5" class="w-full pl-9 pr-3 py-2 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-lg text-sm focus:ring-2 focus:ring-emerald-500 outline-none">
                    </div>
                </div>

                <div class="flex items-center gap-3 w-full lg:w-auto">
                    <p id="chunkCountMeta" class="text-xs text-slate-500 font-bold bg-emerald-50 dark:bg-emerald-900/20 text-emerald-600 px-3 py-1.5 rounded-lg hidden md:block"></p>
                    <button id="exportBtn" class="bg-emerald-500 hover:bg-emerald-600 text-white px-6 py-2 rounded-lg font-bold shadow-md transition-colors w-full lg:w-auto flex items-center justify-center">
                        <i class="fa-solid fa-scissors mr-2"></i> Split PDF
                    </button>
                </div>

            </div>

            <div id="pageGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6 pb-10"></div>
            
        </section>

    </main>

    <script src="js/pdfking-utils.js"></script>
    <script src="js/tool-split.js"></script>
</body>
</html>
