<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Split / Extract PDF | PDFKing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen flex flex-col">

    <nav class="p-6 flex justify-between items-center max-w-6xl mx-auto w-full">
        <a href="index.html" class="text-2xl font-black tracking-tighter text-indigo-600 hover:opacity-80 transition-opacity">PDFKing</a>
        <a href="index.html" class="text-sm font-medium hover:text-indigo-600"><i class="fa-solid fa-arrow-left mr-2"></i>Back to Tools</a>
    </nav>

    <main class="max-w-2xl mx-auto px-6 py-12 flex-grow w-full text-center">
        <div class="w-16 h-16 bg-red-100 rounded-2xl flex items-center justify-center mx-auto mb-6 text-red-600">
            <i class="fa-solid fa-scissors text-3xl"></i>
        </div>
        <h2 class="text-3xl font-extrabold mb-4">Split / Extract PDF</h2>
        <p class="text-slate-500 mb-8">Select a PDF and specify the pages you wish to extract into a new document.</p>

        <div class="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm text-left">
            <input type="file" id="fileInput" accept="application/pdf" class="hidden">
            <label for="fileInput" class="cursor-pointer block border-2 border-dashed border-red-300 bg-red-50 rounded-xl p-8 hover:bg-red-100 transition-colors mb-6 text-center">
                <i class="fa-solid fa-file-pdf text-4xl text-red-400 mb-3"></i>
                <span id="fileLabel" class="block text-red-700 font-medium">Click to select a PDF file</span>
            </label>

            <div class="mb-6">
                <label for="pageRange" class="block text-sm font-bold text-slate-700 mb-2">Pages to extract (e.g., 1, 3, 5-8):</label>
                <input type="text" id="pageRange" placeholder="e.g., 1-5, 8, 11-13" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-red-500 transition-colors" disabled>
                <p class="text-xs text-slate-500 mt-2" id="pageCountInfo">Load a document to see total pages.</p>
            </div>

            <button id="extractBtn" class="w-full bg-red-600 text-white font-bold py-3 px-6 rounded-xl hover:bg-red-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                Extract Pages
            </button>
            
            <div id="status" class="mt-4 text-sm font-medium hidden text-center"></div>
        </div>
    </main>

    <script>
        // # Selecting DOM elements
        const fileInput = document.getElementById('fileInput');
        const fileLabel = document.getElementById('fileLabel');
        const pageRange = document.getElementById('pageRange');
        const extractBtn = document.getElementById('extractBtn');
        const statusDiv = document.getElementById('status');
        const pageCountInfo = document.getElementById('pageCountInfo');
        
        let currentFile = null;
        let totalPages = 0;

        // # Handling file selection events
        fileInput.addEventListener('change', async (e) => {
            if (e.target.files.length === 0) return;
            
            currentFile = e.target.files[0];
            fileLabel.innerText = currentFile.name;
            
            statusDiv.className = 'mt-4 text-sm font-medium text-slate-600 block text-center';
            statusDiv.innerText = 'Analyzing document structure...';
            
            try {
                // # I am parsing the uploaded file to determine its page count. This ensures validation for the user's input range.
                const fileArrayBuffer = await currentFile.arrayBuffer();
                const { PDFDocument } = PDFLib;
                const pdfDoc = await PDFDocument.load(fileArrayBuffer);
                totalPages = pdfDoc.getPageCount();
                
                pageCountInfo.innerText = `Document loaded. Total pages: ${totalPages}`;
                pageRange.disabled = false;
                extractBtn.disabled = false;
                statusDiv.classList.add('hidden');
            } catch (error) {
                console.error(error);
                statusDiv.className = 'mt-4 text-sm font-medium text-red-600 block text-center';
                statusDiv.innerText = 'Error reading the PDF file. It may be corrupted or encrypted.';
                pageRange.disabled = true;
                extractBtn.disabled = true;
            }
        });

        // # Parsing the input string into an array of page indices
        function parsePageRange(rangeStr, maxPages) {
            // # I am utilizing a Set to handle potential duplicate page requests and sorting them to maintain document order.
            const pages = new Set();
            const parts = rangeStr.replace(/\s+/g, '').split(',');
            
            for (const part of parts) {
                if (!part) continue;
                if (part.includes('-')) {
                    const [start, end] = part.split('-').map(num => parseInt(num, 10));
                    if (isNaN(start) || isNaN(end) || start > end || start < 1 || end > maxPages) return null;
                    for (let i = start; i <= end; i++) pages.add(i - 1);
                } else {
                    const page = parseInt(part, 10);
                    if (isNaN(page) || page < 1 || page > maxPages) return null;
                    pages.add(page - 1);
                }
            }
            return Array.from(pages).sort((a, b) => a - b);
        }

        // # Executing the extraction operation
        extractBtn.addEventListener('click', async () => {
            if (!currentFile) return;

            const indicesToExtract = parsePageRange(pageRange.value, totalPages);
            
            if (!indicesToExtract || indicesToExtract.length === 0) {
                statusDiv.className = 'mt-4 text-sm font-medium text-red-600 block text-center';
                statusDiv.innerText = `Invalid page range. Please enter valid numbers between 1 and ${totalPages}.`;
                return;
            }

            try {
                // # Updating UI state
                extractBtn.disabled = true;
                extractBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>Extracting...';
                statusDiv.className = 'mt-4 text-sm font-medium text-slate-600 block text-center';
                statusDiv.innerText = 'Processing document...';

                // # Loading the source document into memory
                const fileArrayBuffer = await currentFile.arrayBuffer();
                const { PDFDocument } = PDFLib;
                const sourcePdf = await PDFDocument.load(fileArrayBuffer);
                
                // # I am creating a fresh document instance to contain only the specifically requested pages.
                const newPdf = await PDFDocument.create();
                const copiedPages = await newPdf.copyPages(sourcePdf, indicesToExtract);
                copiedPages.forEach((page) => newPdf.addPage(page));

                // # Serializing the new document into a byte array
                const newPdfBytes = await newPdf.save();

                // # Creating a memory blob and triggering the client-side download
                const blob = new Blob([newPdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `extracted_${currentFile.name}`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                statusDiv.className = 'mt-4 text-sm font-medium text-green-600 block text-center';
                statusDiv.innerText = 'Extraction complete. Download started.';
            } catch (error) {
                // # Handling standard errors
                console.error(error);
                statusDiv.className = 'mt-4 text-sm font-medium text-red-600 block text-center';
                statusDiv.innerText = 'An error occurred during extraction.';
            } finally {
                // # Restoring UI state
                extractBtn.disabled = false;
                extractBtn.innerText = 'Extract Pages';
            }
        });
    </script>
</body>
</html>
