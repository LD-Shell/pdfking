<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotate Pages | PDFKing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen flex flex-col">

    <nav class="p-6 flex justify-between items-center max-w-6xl mx-auto w-full">
        <a href="index.html" class="text-2xl font-black tracking-tighter text-indigo-600 hover:opacity-80 transition-opacity">PDFKing</a>
        <a href="index.html" class="text-sm font-medium hover:text-indigo-600"><i class="fa-solid fa-arrow-left mr-2"></i>Back to Tools</a>
    </nav>

    <main class="max-w-2xl mx-auto px-6 py-12 flex-grow w-full text-center">
        <div class="w-16 h-16 bg-blue-100 rounded-2xl flex items-center justify-center mx-auto mb-6 text-blue-600">
            <i class="fa-solid fa-rotate text-3xl"></i>
        </div>
        <h2 class="text-3xl font-extrabold mb-4">Rotate Pages</h2>
        <p class="text-slate-500 mb-8">Correct the orientation of your document pages instantly.</p>

        <div class="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm text-left">
            <input type="file" id="fileInput" accept="application/pdf" class="hidden">
            <label for="fileInput" class="cursor-pointer block border-2 border-dashed border-blue-300 bg-blue-50 rounded-xl p-8 hover:bg-blue-100 transition-colors mb-6 text-center">
                <i class="fa-solid fa-file-pdf text-4xl text-blue-400 mb-3"></i>
                <span id="fileLabel" class="block text-blue-700 font-medium">Click to select a PDF file</span>
            </label>

            <div class="mb-6">
                <label for="rotationAngle" class="block text-sm font-bold text-slate-700 mb-2">Rotation angle:</label>
                <select id="rotationAngle" class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors bg-white">
                    <option value="90">90 Degrees Clockwise</option>
                    <option value="-90">90 Degrees Counter-Clockwise</option>
                    <option value="180">180 Degrees</option>
                </select>
            </div>

            <button id="rotateBtn" class="w-full bg-blue-600 text-white font-bold py-3 px-6 rounded-xl hover:bg-blue-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                Apply Rotation
            </button>
            
            <div id="status" class="mt-4 text-sm font-medium hidden text-center p-4 rounded-xl"></div>
        </div>
    </main>

    <script>
        const fileInput = document.getElementById('fileInput');
        const fileLabel = document.getElementById('fileLabel');
        const rotationAngle = document.getElementById('rotationAngle');
        const rotateBtn = document.getElementById('rotateBtn');
        const statusDiv = document.getElementById('status');
        
        let currentFile = null;

        // # Binding file selection events
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length === 0) return;
            
            currentFile = e.target.files[0];
            fileLabel.innerText = currentFile.name;
            rotateBtn.disabled = false;
            statusDiv.classList.add('hidden');
        });

        // # Executing the rotation matrix application
        rotateBtn.addEventListener('click', async () => {
            if (!currentFile) return;

            try {
                // # Updating interface state
                rotateBtn.disabled = true;
                rotateBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>Processing...';
                statusDiv.className = 'mt-4 text-sm font-medium text-slate-600 block bg-slate-50 text-center p-4 rounded-xl';
                statusDiv.innerText = 'Applying rotation parameters...';

                const fileArrayBuffer = await currentFile.arrayBuffer();
                const { PDFDocument, degrees } = PDFLib;
                
                // # Loading the document into memory
                const pdfDoc = await PDFDocument.load(fileArrayBuffer);
                const pages = pdfDoc.getPages();
                const angleToAdd = parseInt(rotationAngle.value, 10);

                // # I am iterating through each page to adjust its current rotation coordinate system.
                for (let i = 0; i < pages.length; i++) {
                    const page = pages[i];
                    const currentRotation = page.getRotation().angle;
                    const newRotation = (currentRotation + angleToAdd) % 360;
                    page.setRotation(degrees(newRotation));
                }

                // # Serializing the modified document
                const modifiedPdfBytes = await pdfDoc.save();

                // # Triggering the client-side download
                const blob = new Blob([modifiedPdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `rotated_${currentFile.name}`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                statusDiv.className = 'mt-4 text-sm font-medium text-green-700 block bg-green-50 text-center p-4 rounded-xl';
                statusDiv.innerText = 'Rotation applied successfully. Download started.';

            } catch (error) {
                console.error(error);
                statusDiv.className = 'mt-4 text-sm font-medium text-red-700 block bg-red-50 text-center p-4 rounded-xl';
                statusDiv.innerText = 'An error occurred. The file may be password-protected or corrupted.';
            } finally {
                // # Resetting interface state
                rotateBtn.disabled = false;
                rotateBtn.innerText = 'Apply Rotation';
            }
        });
    </script>
</body>
</html>
