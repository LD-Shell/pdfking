    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] } } } };
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) { document.documentElement.classList.add('dark'); }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>

    <style>
        .page-card { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .page-card:hover .page-controls { opacity: 1; }
        .pdf-canvas-wrapper { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .dragging { opacity: 0.5; transform: scale(0.95); }
        .drag-over-zone { border-color: #3b82f6 !important; background-color: rgba(59, 130, 246, 0.1) !important; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #334155; }
    </style>

<body class="bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 min-h-screen flex flex-col transition-colors duration-300">

    <header class="border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950 sticky top-0 z-50">
        <nav class="max-w-7xl mx-auto px-6 h-16 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 hover:opacity-80 transition-opacity">
                <i class="fa-solid fa-rotate text-indigo-600 text-xl"></i>
                <span class="text-xl font-black tracking-tighter">PDFKing</span>
            </a>
            <button id="themeToggle" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                <i class="fa-solid fa-moon dark:hidden"></i>
                <i class="fa-solid fa-sun hidden dark:block text-yellow-400"></i>
            </button>
        </nav>
    </header>

    <main class="flex-grow max-w-7xl mx-auto px-6 py-8 w-full flex flex-col">
        
        <section id="uploadZone" class="flex flex-col items-center justify-center border-2 border-dashed border-indigo-300 rounded-3xl bg-indigo-50/50 hover:bg-indigo-50 cursor-pointer p-16 text-center group">
            <input type="file" id="fileInput" accept="application/pdf" class="hidden">
            <div class="w-20 h-20 bg-indigo-100 rounded-2xl flex items-center justify-center mb-6 text-indigo-600 group-hover:scale-110 transition-transform">
                <i class="fa-solid fa-file-pdf text-4xl"></i>
            </div>
            <h1 class="text-3xl font-bold mb-3">Rotate & Organize PDF</h1>
            <p class="text-slate-500 mb-6 max-w-md">Drag and drop your PDF here to reorder or rotate pages.</p>
            <button class="bg-indigo-600 text-white px-8 py-3 rounded-xl font-medium shadow-sm">Select PDF File</button>
        </section>

        <div id="loadingOverlay" class="hidden flex-col items-center justify-center py-20">
            <i class="fa-solid fa-circle-notch fa-spin text-5xl text-indigo-600 mb-4"></i>
            <p id="loadingText" class="text-lg font-medium text-slate-600">Analyzing document...</p>
        </div>

        <section id="workspace" class="hidden flex-col gap-6 w-full h-full">
            <div class="bg-white dark:bg-slate-950 p-4 rounded-2xl border border-slate-200 shadow-sm flex flex-wrap items-center justify-between gap-4 sticky top-20 z-40">
                <div class="flex items-center gap-2">
                    <button id="selectAllBtn" class="px-3 py-2 text-sm font-medium rounded-lg border border-slate-200">Select All</button>
                    <button id="rotLeftBtn" class="px-3 py-2 text-sm font-medium border border-slate-200 rounded-lg"><i class="fa-solid fa-rotate-left mr-1"></i> Left</button>
                    <button id="rotRightBtn" class="px-3 py-2 text-sm font-medium border border-slate-200 rounded-lg"><i class="fa-solid fa-rotate-right mr-1"></i> Right</button>
                    <button id="delBtn" class="px-3 py-2 text-sm font-medium text-red-600 border border-slate-200 rounded-lg"><i class="fa-solid fa-trash"></i></button>
                </div>
                <div class="flex items-center gap-3">
                    <p id="fileMeta" class="text-xs text-slate-500 hidden md:block mr-2"></p>
                    <input type="text" id="exportFilename" placeholder="rotated.pdf" class="px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm w-40">
                    <button id="exportBtn" class="bg-indigo-600 text-white px-6 py-2 rounded-lg font-medium shadow-sm"><i class="fa-solid fa-download"></i> Save PDF</button>
                </div>
            </div>
            <div id="pageGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6 pb-20"></div>
        </section>
    </main>

    <footer class="mt-auto border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-950 py-12">
        <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row items-center justify-between text-slate-500 dark:text-slate-400">
            
            <div class="flex items-center gap-2 mb-4 md:mb-0">
                <i class="fa-solid fa-crown text-xl text-slate-300 dark:text-slate-700"></i>
                <span class="font-bold text-slate-700 dark:text-slate-300">PDFKing</span>
            </div>
            
            <div class="text-center md:text-left mb-4 md:mb-0 text-sm font-medium">
                &copy; 2026 PDFKing. Built for Privacy.
            </div>

            <div class="flex gap-6 text-sm font-medium">
                <a href="privacy.html" class="hover:text-indigo-500 transition-colors">Privacy Policy</a>
                <a href="privacy.html" class="hover:text-indigo-500 transition-colors">Terms of Service</a>
            </div>

        </div>
    </footer>

    <script src="js/pdfking-utils.js"></script>
    <script src="js/tool-rotate.js"></script>
</body>
</html>
