<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF to Image | PDFKing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        // Setting up the PDF.js worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen flex flex-col">

    <nav class="p-6 flex justify-between items-center max-w-6xl mx-auto w-full">
        <a href="index.html" class="text-2xl font-black tracking-tighter text-indigo-600 hover:opacity-80 transition-opacity">PDFKing</a>
        <a href="index.html" class="text-sm font-medium hover:text-indigo-600"><i class="fa-solid fa-arrow-left mr-2"></i>Back to Tools</a>
    </nav>

    <main class="max-w-4xl mx-auto px-6 py-12 flex-grow w-full text-center">
        <div class="w-16 h-16 bg-orange-100 rounded-2xl flex items-center justify-center mx-auto mb-6 text-orange-600">
            <i class="fa-solid fa-image text-3xl"></i>
        </div>
        <h2 class="text-3xl font-extrabold mb-4">PDF to Image</h2>
        <p class="text-slate-500 mb-8">Convert PDF pages into high-quality JPG assets directly in your browser.</p>

        <div class="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm max-w-2xl mx-auto mb-8">
            <input type="file" id="fileInput" accept="application/pdf" class="hidden">
            <label for="fileInput" class="cursor-pointer block border-2 border-dashed border-orange-300 bg-orange-50 rounded-xl p-8 hover:bg-orange-100 transition-colors mb-6 text-center">
                <i class="fa-solid fa-file-pdf text-4xl text-orange-400 mb-3"></i>
                <span id="fileLabel" class="block text-orange-700 font-medium">Click to select a PDF file</span>
            </label>

            <button id="convertBtn" class="w-full bg-orange-600 text-white font-bold py-3 px-6 rounded-xl hover:bg-orange-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                Convert to Images
            </button>
            
            <div id="status" class="mt-4 text-sm font-medium hidden text-center p-4 rounded-xl"></div>
        </div>

        <div id="imageContainer" class="grid grid-cols-1 md:grid-cols-2 gap-6 hidden">
            </div>
    </main>

    <script>
        const fileInput = document.getElementById('fileInput');
        const fileLabel = document.getElementById('fileLabel');
        const convertBtn = document.getElementById('convertBtn');
        const statusDiv = document.getElementById('status');
        const imageContainer = document.getElementById('imageContainer');
        
        let currentFile = null;

        // Handle file selection
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length === 0) return;
            
            currentFile = e.target.files[0];
            fileLabel.innerText = currentFile.name;
            convertBtn.disabled = false;
            statusDiv.classList.add('hidden');
            imageContainer.innerHTML = ''; // Clear previous images
            imageContainer.classList.add('hidden');
        });

        // Execute conversion
        convertBtn.addEventListener('click', async () => {
            if (!currentFile) return;

            try {
                // Update UI state
                convertBtn.disabled = true;
                convertBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>Converting...';
                statusDiv.className = 'mt-4 text-sm font-medium text-slate-600 block bg-slate-50 text-center p-4 rounded-xl';
                statusDiv.innerText = 'Loading PDF engine...';
                imageContainer.innerHTML = '';
                imageContainer.classList.remove('hidden');

                const fileArrayBuffer = await currentFile.arrayBuffer();
                
                // Load PDF document using PDF.js
                const loadingTask = pdfjsLib.getDocument(fileArrayBuffer);
                const pdf = await loadingTask.promise;
                
                statusDiv.innerText = `Processing ${pdf.numPages} pages...`;

                for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                    const page = await pdf.getPage(pageNum);
                    
                    // Set scale for high quality (e.g., 2.0 or 3.0)
                    const scale = 2.0; 
                    const viewport = page.getViewport({ scale: scale });

                    // Prepare canvas
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    // Render PDF page into canvas context
                    const renderContext = {
                        canvasContext: context,
                        viewport: viewport
                    };
                    await page.render(renderContext).promise;

                    // Convert canvas to JPG data URL
                    const imgDataUrl = canvas.toDataURL('image/jpeg', 0.9);

                    // Create UI elements for the image
                    createImageCard(imgDataUrl, pageNum);
                }

                statusDiv.className = 'mt-4 text-sm font-medium text-green-700 block bg-green-50 text-center p-4 rounded-xl';
                statusDiv.innerText = 'Conversion complete! You can download your images below.';

            } catch (error) {
                console.error(error);
                statusDiv.className = 'mt-4 text-sm font-medium text-red-700 block bg-red-50 text-center p-4 rounded-xl';
                statusDiv.innerText = 'An error occurred while converting the document.';
            } finally {
                convertBtn.disabled = false;
                convertBtn.innerText = 'Convert to Images';
            }
        });

        // Helper function to build the image display cards
        function createImageCard(dataUrl, pageNum) {
            const card = document.createElement('div');
            card.className = 'bg-white p-4 rounded-2xl border border-slate-200 shadow-sm flex flex-col';

            const img = document.createElement('img');
            img.src = dataUrl;
            img.className = 'w-full h-auto object-contain rounded-xl border border-slate-100 mb-4 bg-slate-50';
            img.style.maxHeight = '300px';

            const dlBtn = document.createElement('a');
            dlBtn.href = dataUrl;
            dlBtn.download = `page_${pageNum}.jpg`;
            dlBtn.className = 'mt-auto bg-slate-900 text-white font-medium py-2 px-4 rounded-lg hover:bg-slate-800 transition-colors text-sm';
            dlBtn.innerHTML = `<i class="fa-solid fa-download mr-2"></i>Download Page ${pageNum}`;

            card.appendChild(img);
            card.appendChild(dlBtn);
            imageContainer.appendChild(card);
        }
    </script>
</body>
</html>
