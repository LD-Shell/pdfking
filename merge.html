<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merge PDFs | PDFKing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen flex flex-col">

    <nav class="p-6 flex justify-between items-center max-w-6xl mx-auto w-full">
        <a href="index.html" class="text-2xl font-black tracking-tighter text-indigo-600 hover:opacity-80 transition-opacity">PDFKing</a>
        <a href="index.html" class="text-sm font-medium hover:text-indigo-600"><i class="fa-solid fa-arrow-left mr-2"></i>Back to Tools</a>
    </nav>

    <main class="max-w-2xl mx-auto px-6 py-12 flex-grow w-full text-center">
        <div class="w-16 h-16 bg-indigo-100 rounded-2xl flex items-center justify-center mx-auto mb-6 text-indigo-600">
            <i class="fa-solid fa-object-group text-3xl"></i>
        </div>
        <h2 class="text-3xl font-extrabold mb-4">Merge PDFs</h2>
        <p class="text-slate-500 mb-8">Select multiple PDF files to combine them into a single document.</p>

        <div class="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm">
            <input type="file" id="fileInput" multiple accept="application/pdf" class="hidden">
            <label for="fileInput" class="cursor-pointer block border-2 border-dashed border-indigo-300 bg-indigo-50 rounded-xl p-8 hover:bg-indigo-100 transition-colors mb-6">
                <i class="fa-solid fa-file-pdf text-4xl text-indigo-400 mb-3"></i>
                <span class="block text-indigo-700 font-medium">Click to select PDF files</span>
            </label>

            <ul id="fileList" class="text-left text-sm text-slate-600 mb-6 space-y-2 max-h-48 overflow-y-auto"></ul>

            <button id="mergeBtn" class="w-full bg-indigo-600 text-white font-bold py-3 px-6 rounded-xl hover:bg-indigo-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                Merge Files
            </button>
            
            <div id="status" class="mt-4 text-sm font-medium hidden"></div>
        </div>
    </main>

    <script>
        // # Selecting DOM elements
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const mergeBtn = document.getElementById('mergeBtn');
        const statusDiv = document.getElementById('status');
        let selectedFiles = [];

        // # Handling file selection events
        fileInput.addEventListener('change', (e) => {
            selectedFiles = Array.from(e.target.files);
            updateFileList();
            mergeBtn.disabled = selectedFiles.length < 2;
        });

        // # Updating the visual file list
        function updateFileList() {
            fileList.innerHTML = '';
            selectedFiles.forEach((file, index) => {
                const li = document.createElement('li');
                li.className = 'flex justify-between items-center bg-slate-50 p-2 rounded';
                li.innerHTML = `<span>${index + 1}. ${file.name}</span>`;
                fileList.appendChild(li);
            });
        }

        // # Executing the merge operation
        mergeBtn.addEventListener('click', async () => {
            if (selectedFiles.length < 2) return;
            
            try {
                // # Updating UI state
                mergeBtn.disabled = true;
                mergeBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>Merging...';
                statusDiv.className = 'mt-4 text-sm font-medium text-slate-600 block';
                statusDiv.innerText = 'Processing documents...';

                // # I am initializing an empty PDF document to serve as the master output file.
                const { PDFDocument } = PDFLib;
                const mergedPdf = await PDFDocument.create();

                // # I am iterating through the user-provided files to extract their array buffers.
                for (let i = 0; i < selectedFiles.length; i++) {
                    statusDiv.innerText = `Loading file ${i + 1} of ${selectedFiles.length}...`;
                    const fileArrayBuffer = await selectedFiles[i].arrayBuffer();
                    
                    // # I am loading the current PDF and copying its pages into the master document.
                    const pdfDoc = await PDFDocument.load(fileArrayBuffer);
                    const copiedPages = await mergedPdf.copyPages(pdfDoc, pdfDoc.getPageIndices());
                    copiedPages.forEach((page) => mergedPdf.addPage(page));
                }

                statusDiv.innerText = 'Generating final file...';

                // # Serializing the master document into a byte array
                const mergedPdfBytes = await mergedPdf.save();

                // # Creating a memory blob and triggering the client-side download
                const blob = new Blob([mergedPdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'merged_document.pdf';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                statusDiv.className = 'mt-4 text-sm font-medium text-green-600 block';
                statusDiv.innerText = 'Merge complete. Download started.';
            } catch (error) {
                // # Handling standard errors
                console.error(error);
                statusDiv.className = 'mt-4 text-sm font-medium text-red-600 block';
                statusDiv.innerText = 'An error occurred during the merge process.';
            } finally {
                // # Restoring UI state
                mergeBtn.disabled = false;
                mergeBtn.innerText = 'Merge Files';
            }
        });
    </script>
</body>
</html>
